<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'">
<style>
:root{--bg:#1e1e2e;--fg:#cdd6f4;--accent:#89b4fa;--row-hover:rgba(255,255,255,0.03)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px 24px;overflow-y:auto;-webkit-user-select:none;user-select:none}
h1{font-size:16px;font-weight:600;margin-bottom:14px;color:#f5f5f5}
.row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.row-text{flex:1;min-width:0;overflow:hidden}
.row-label{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-desc{font-size:11px;color:#a6adc8;margin-top:2px}
.row-control{flex-shrink:0}
.toggle{position:relative;display:inline-block;width:38px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle .track{position:absolute;inset:0;background:#585b70;border-radius:11px;cursor:pointer;transition:background .2s}
.toggle input:checked+.track{background:var(--accent)}
.toggle .thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle input:checked+.track .thumb{transform:translateX(16px)}
.color-input{width:30px;height:24px;border:none;border-radius:4px;cursor:pointer;background:transparent;padding:0}
.color-input::-webkit-color-swatch-wrapper{padding:0}
.color-input::-webkit-color-swatch{border:1px solid rgba(255,255,255,.25);border-radius:4px}
.slider-wrap{display:flex;align-items:center;gap:6px}
.slider-wrap input[type=range]{width:90px;height:4px;-webkit-appearance:none;appearance:none;background:#585b70;border-radius:2px;outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer}
.slider-wrap .val{font-size:12px;color:#a6adc8;min-width:30px;text-align:right}
.btn-row{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.btn{padding:6px 18px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer}
.btn-preview{background:#a6e3a1;color:#1e1e2e}.btn-preview:hover{background:#c0f0bb}
.note{font-size:11px;color:#6c7086;margin-top:12px;text-align:center}
</style></head><body>
<h1>Banter Settings</h1>

<div class="row">
  <div class="row-text"><div class="row-label">Enable banter</div><div class="row-desc">Show quips and interactions on pet click</div></div>
  <div class="row-control"><label class="toggle"><input type="checkbox" id="banterEnabled"><span class="track"><span class="thumb"></span></span></label></div>
</div>
<div class="row">
  <div class="row-text"><div class="row-label">Bubble color</div><div class="row-desc">Speech bubble background</div></div>
  <div class="row-control"><input type="color" class="color-input" id="banterColor"></div>
</div>
<div class="row">
  <div class="row-text"><div class="row-label">Opacity</div><div class="row-desc">Max background opacity (10–100%)</div></div>
  <div class="row-control slider-wrap"><input type="range" id="banterOpacity" min="10" max="100" step="5"><span class="val" id="opacityVal"></span></div>
</div>
<div class="row">
  <div class="row-text"><div class="row-label">Gap from pet</div><div class="row-desc">Bubble distance (50–200%)</div></div>
  <div class="row-control slider-wrap"><input type="range" id="banterScale" min="50" max="200" step="10"><span class="val" id="scaleVal"></span></div>
</div>

<div class="btn-row"><button class="btn btn-preview" id="btnPreview">Preview</button></div>
<div class="note">Changes save instantly. Right-click pet → Banter to toggle.</div>

<script>
const $=id=>document.getElementById(id);
let banterColor,banterOpacity,banterScale;

async function init(){
  const p=await window.banterSettings.load();
  $("banterEnabled").checked=p.banterEnabled!==false;
  $("banterColor").value=p.banterColor||"#1e1e1e";banterColor=p.banterColor||"#1e1e1e";
  $("banterOpacity").value=p.banterOpacity??88;banterOpacity=p.banterOpacity??88;$("opacityVal").textContent=banterOpacity+"%";
  $("banterScale").value=p.banterScale??100;banterScale=p.banterScale??100;$("scaleVal").textContent=banterScale+"%";
}

$("banterEnabled").addEventListener("change",()=>window.banterSettings.update("banterEnabled",$("banterEnabled").checked));

$("banterColor").addEventListener("change",()=>{
  banterColor=$("banterColor").value;window.banterSettings.update("banterColor",banterColor);
});
$("banterOpacity").addEventListener("input",()=>{$("opacityVal").textContent=$("banterOpacity").value+"%"});
$("banterOpacity").addEventListener("change",()=>{
  banterOpacity=Number($("banterOpacity").value);window.banterSettings.update("banterOpacity",banterOpacity);
});
$("banterScale").addEventListener("input",()=>{$("scaleVal").textContent=$("banterScale").value+"%"});
$("banterScale").addEventListener("change",()=>{
  banterScale=Number($("banterScale").value);window.banterSettings.update("banterScale",banterScale);
});

$("btnPreview").addEventListener("click",async()=>{
  $("btnPreview").disabled=true;$("btnPreview").textContent="…";
  await window.banterSettings.preview({banterColor,banterOpacity,banterScale});
  $("btnPreview").textContent="Preview";$("btnPreview").disabled=false;
});

init();
</script></body></html>
