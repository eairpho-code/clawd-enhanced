<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
:root{
  --bg:rgba(12,14,24,0.8);
  --fg:rgba(235,238,248,0.95);
  --fg-dim:rgba(195,200,215,0.78);
  --cyan:rgba(135,225,232,0.95);
  --bubble-user:rgba(135,225,232,0.1);
  --bubble-ai:rgba(210,218,235,0.07);
  --input-bg:rgba(16,18,30,0.85);
  --border:rgba(135,225,232,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--fg);
  font-family:"SF Mono",Menlo,monospace;font-size:13px;line-height:1.55;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
  border-radius:10px;
}
#messages{
  flex:1;overflow-y:auto;padding:10px 12px 4px;
  display:flex;flex-direction:column;gap:5px;
}
.msg{max-width:88%;padding:5px 10px;border-radius:8px;font-size:12.5px;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--bubble-user);color:var(--fg);border:1px solid var(--border)}
.msg.ai{align-self:flex-start;background:var(--bubble-ai);color:var(--fg-dim);border:1px solid rgba(255,255,255,0.04)}
.msg .who{font-size:9px;color:var(--cyan);margin-bottom:1px;text-transform:uppercase;letter-spacing:0.5px}
#input-wrap{
  display:flex;gap:6px;padding:8px 10px 10px;
  border-top:1px solid var(--border);
}
#input-wrap input{
  flex:1;background:var(--input-bg);color:var(--fg);
  border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;font-size:13px;outline:none;
  font-family:inherit;caret-color:var(--cyan);
}
#input-wrap input:focus{border-color:var(--cyan)}
#input-wrap input::placeholder{color:rgba(255,255,255,0.18)}
#input-wrap button{
  background:rgba(120,210,220,0.12);color:var(--cyan);
  border:1px solid var(--border);border-radius:6px;
  padding:6px 12px;font-size:12px;cursor:pointer;
  font-family:inherit;transition:background .15s;
}
#input-wrap button:hover{background:rgba(120,210,220,0.2)}
#input-wrap button:disabled{opacity:0.3;cursor:default}
#status{text-align:center;font-size:10px;color:rgba(255,255,255,0.15);padding:3px;-webkit-app-region:no-drag}
/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(120,210,220,0.15);border-radius:2px}
</style></head><body>
<div id="status"></div>
<div id="messages"></div>
<div id="input-wrap">
  <input id="msgInput" placeholder="…" maxlength="200" autofocus>
  <button id="btnSend">↵</button>
</div>
<script src="chat-renderer.js"></script>
</body></html>
